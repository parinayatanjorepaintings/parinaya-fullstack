<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product — Parinaya Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css"/>
<style>
.form-section { margin-bottom: 28px; }
.accordion-section {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.accordion-head {
  padding: 12px 16px;
  background: var(--bg);
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.accordion-body { padding: 16px; border-top: 1px solid var(--border); }
.sticky-actions {
  position: sticky;
  bottom: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  z-index: 10;
  margin: 0 -28px;
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="toast"></div>
<script src="/admin/js/admin.js"></script>
<script src="/admin/js/sidebar.js"></script>
<script>
let productId = null;
let product   = null;
let images    = [];
let cats      = [];
let siteDefaults = {};

async function init() {
  const me = await requireAuth();
  if (!me) return;

  // Determine edit vs new
  const path = window.location.pathname;
  const match = path.match(/\/admin\/products\/(\d+)/);
  productId = match ? parseInt(match[1]) : null;
  const title = productId ? 'Edit Product' : 'Add Product';

  document.getElementById('app').innerHTML = `
    ${renderSidebar()}
    <div class="main">
      <div class="topbar">
        <a href="/admin/products" class="btn btn-ghost btn-sm">← Back</a>
        <span class="topbar-title" style="margin-left:8px">${title}</span>
      </div>
      <div class="content" style="max-width:900px">

        <!-- ── Core Info ── -->
        <div class="card mb-6">
          <div class="card-header"><h2>Product Details</h2></div>
          <div class="card-body">
            <div class="form-group">
              <label>Product Name <span style="color:var(--error)">*</span></label>
              <input type="text" id="f-name" placeholder="e.g. Goddess Lakshmi Tanjore Painting"/>
            </div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label>Category</label>
                <select id="f-cat"><option value="">— Select category —</option></select>
              </div>
              <div class="form-group">
                <label>Price (₹) <span style="color:var(--error)">*</span></label>
                <input type="number" id="f-price" placeholder="18500" min="0" step="1"/>
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="f-desc" rows="4" placeholder="A beautifully composed Tanjore painting of Radha Krishna, finished with gold foil and embedded stones…"></textarea>
            </div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label>Dimensions</label>
                <input type="text" id="f-dimensions" placeholder="Height - 22 Inches  Width - 17 Inches  Weight - 2.3 Kg"/>
              </div>
              <div class="form-group">
                <label>Weight <span class="label-hint">(optional separate field)</span></label>
                <input type="text" id="f-weight" placeholder="2.3 Kg"/>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Trust Badges ── -->
        <div class="card mb-6">
          <div class="card-header"><h2>Trust Badges <span class="label-hint">(shown on product page)</span></h2></div>
          <div class="card-body">
            <div class="form-group">
              <label>Shipping Badge <span class="label-hint">(🚚 line)</span></label>
              <input type="text" id="f-badge1" placeholder="Free shipping across India, dispatched in 1–3 business days"/>
            </div>
            <div class="form-group">
              <label>Quality Badge <span class="label-hint">(🛡 line)</span></label>
              <input type="text" id="f-badge2" placeholder="Handmade by skilled artisans — quality checked before dispatch"/>
            </div>
          </div>
        </div>

        <!-- ── Accordion Sections ── -->
        <div class="card mb-6">
          <div class="card-header"><h2>Product Page Accordions</h2></div>
          <div class="card-body">
            <p class="text-muted" style="font-size:12px;margin-bottom:14px">Leave blank to use the site-wide defaults from Settings.</p>

            <div class="accordion-section">
              <div class="accordion-head" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='none'?'block':'none'">
                Shipping & Returns <span>▾</span>
              </div>
              <div class="accordion-body">
                <textarea id="f-shipping" rows="4" placeholder="Leave blank to use default…"></textarea>
              </div>
            </div>

            <div class="accordion-section">
              <div class="accordion-head" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='none'?'block':'none'">
                Care Instructions <span>▾</span>
              </div>
              <div class="accordion-body" style="display:none">
                <textarea id="f-care" rows="3" placeholder="Leave blank to use default…"></textarea>
              </div>
            </div>

            <div class="accordion-section">
              <div class="accordion-head" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='none'?'block':'none'">
                Please Note <span>▾</span>
              </div>
              <div class="accordion-body" style="display:none">
                <textarea id="f-note" rows="3" placeholder="Leave blank to use default…"></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Images ── -->
        <div class="card mb-6">
          <div class="card-header">
            <h2>Product Images</h2>
            <span class="text-muted" style="font-size:12px">First image = primary. Drag to reorder coming soon.</span>
          </div>
          <div class="card-body">
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
              <div class="upload-zone-icon">🖼️</div>
              <p>Click or drag & drop images here</p>
              <p style="margin-top:4px">JPEG, PNG, WebP • Max 10 MB each • Multiple allowed</p>
              <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleFiles(this.files)"/>
            </div>
            <div class="image-preview-grid" id="image-grid"></div>
          </div>
        </div>

        <!-- ── Visibility ── -->
        <div class="card mb-6">
          <div class="card-header"><h2>Visibility & Status</h2></div>
          <div class="card-body">
            <div class="form-row cols-3">
              <div class="form-group">
                <label>Active (visible on site)</label>
                <div class="toggle-group">
                  <label class="toggle"><input type="checkbox" id="f-active" checked/><span class="toggle-slider"></span></label>
                  <span id="f-active-label">Yes</span>
                </div>
              </div>
              <div class="form-group">
                <label>In Stock</label>
                <div class="toggle-group">
                  <label class="toggle"><input type="checkbox" id="f-stock" checked/><span class="toggle-slider"></span></label>
                  <span id="f-stock-label">In Stock</span>
                </div>
              </div>
              <div class="form-group">
                <label>Featured on Homepage</label>
                <div class="toggle-group">
                  <label class="toggle"><input type="checkbox" id="f-featured"/><span class="toggle-slider"></span></label>
                  <span id="f-featured-label">No</span>
                </div>
              </div>
            </div>
            <div class="form-group" style="margin-top:4px">
              <label>Sort Order <span class="label-hint">(lower = appears first)</span></label>
              <input type="number" id="f-sort" value="0" min="0" style="width:120px"/>
            </div>
          </div>
        </div>

        <div class="sticky-actions">
          <a href="/admin/products" class="btn btn-outline">Cancel</a>
          <button class="btn btn-primary" id="save-btn" onclick="save()">
            ${productId ? 'Save Changes' : 'Create Product'}
          </button>
        </div>
      </div>
    </div>`;

  setActiveNav();
  setupDragDrop();
  setupToggles();

  // Load categories
  cats = await API.get('/categories/admin/all');
  const catSel = document.getElementById('f-cat');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    catSel.appendChild(opt);
  });

  // Load site defaults for badges
  const cfg = await API.get('/config').catch(() => ({}));
  siteDefaults = cfg;
  if (!productId) {
    document.getElementById('f-badge1').placeholder = cfg.trust_badge_1_default || 'Free shipping across India…';
    document.getElementById('f-badge2').placeholder = cfg.trust_badge_2_default || 'Handmade by skilled artisans…';
  }

  // Load existing product if editing
  if (productId) {
    try {
      product = await API.get(`/products/${productId}`);
      populate(product);
    } catch (e) {
      toast('Could not load product: ' + e.message, 'error');
    }
  }
}

function populate(p) {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val ?? ''; };
  set('f-name',       p.name);
  set('f-price',      p.price);
  set('f-desc',       p.description);
  set('f-dimensions', p.dimensions);
  set('f-weight',     p.weight);
  set('f-shipping',   p.shipping_info);
  set('f-care',       p.care_instructions);
  set('f-note',       p.please_note);
  set('f-badge1',     p.trust_badge_1);
  set('f-badge2',     p.trust_badge_2);
  set('f-sort',       p.sort_order);
  if (p.category_id) document.getElementById('f-cat').value = p.category_id;

  const setChk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
  setChk('f-active',   p.active);
  setChk('f-stock',    p.in_stock);
  setChk('f-featured', p.featured);

  updateToggleLabels();

  // Render existing images
  images = p.images || [];
  renderImageGrid();
}

function setupToggles() {
  ['f-active', 'f-stock', 'f-featured'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', updateToggleLabels);
  });
}

function updateToggleLabels() {
  const v = (id) => document.getElementById(id)?.checked;
  const setLabel = (id, t, f) => {
    const el = document.getElementById(id + '-label');
    if (el) el.textContent = v(id) ? t : f;
  };
  setLabel('f-active',   'Visible', 'Hidden');
  setLabel('f-stock',    'In Stock', 'Out of Stock');
  setLabel('f-featured', 'Featured', 'Not featured');
}

function setupDragDrop() {
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
}

async function handleFiles(files) {
  if (!files.length) return;
  if (!productId) {
    // Must save product first before uploading images
    const saved = await save(true);
    if (!saved) return;
  }

  const fd = new FormData();
  for (const f of files) fd.append('images', f);

  try {
    const uploaded = await API.upload(`/products/${productId}/images`, fd);
    images = [...images, ...uploaded];
    renderImageGrid();
    toast(`${uploaded.length} image(s) uploaded`, 'success');
  } catch (e) {
    toast('Upload failed: ' + e.message, 'error');
  }
}

function renderImageGrid() {
  const grid = document.getElementById('image-grid');
  if (!images.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = images.map((img, i) => `
    <div class="image-thumb ${i === 0 ? 'is-primary' : ''}" data-id="${img.id}">
      <img src="${escHtml(img.url)}" alt="" onerror="this.parentElement.style.background='var(--border)'"/>
      <div class="thumb-actions">
        ${i > 0 ? `<button class="thumb-btn thumb-btn-primary" title="Set as primary" onclick="setPrimary(${i})">★</button>` : ''}
        <button class="thumb-btn thumb-btn-del" title="Delete" onclick="deleteImage(${img.id})">✕</button>
      </div>
    </div>`).join('');
}

async function deleteImage(imgId) {
  if (!await confirm('Remove this image?')) return;
  try {
    await API.delete(`/products/${productId}/images/${imgId}`);
    images = images.filter(i => i.id !== imgId);
    renderImageGrid();
    toast('Image removed', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function setPrimary(index) {
  const order = images.map((img, i) => ({
    id: img.id,
    sort_order: i === index ? 0 : (i < index ? i + 1 : i),
  }));
  // Reorder: put chosen image first
  const chosen = images.splice(index, 1)[0];
  images.unshift(chosen);
  try {
    await API.put(`/products/${productId}/images/reorder`, { order: images.map((img, i) => ({ id: img.id, sort_order: i })) });
    renderImageGrid();
    toast('Primary image updated', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function save(silent = false) {
  const name  = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value;

  if (!name) { toast('Product name is required', 'error'); return false; }
  if (!price) { toast('Price is required', 'error'); return false; }

  const payload = {
    name,
    category_id:       document.getElementById('f-cat').value || null,
    price:             parseFloat(price),
    description:       document.getElementById('f-desc').value,
    dimensions:        document.getElementById('f-dimensions').value,
    weight:            document.getElementById('f-weight').value,
    shipping_info:     document.getElementById('f-shipping').value,
    care_instructions: document.getElementById('f-care').value,
    please_note:       document.getElementById('f-note').value,
    trust_badge_1:     document.getElementById('f-badge1').value,
    trust_badge_2:     document.getElementById('f-badge2').value,
    in_stock:          document.getElementById('f-stock').checked,
    featured:          document.getElementById('f-featured').checked,
    active:            document.getElementById('f-active').checked,
    sort_order:        parseInt(document.getElementById('f-sort').value) || 0,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  try {
    let result;
    if (productId) {
      result = await API.put(`/products/${productId}`, payload);
    } else {
      result = await API.post('/products', payload);
      productId = result.id;
      // Update URL without reload so image upload works
      history.replaceState({}, '', `/admin/products/${productId}`);
    }

    if (!silent) toast('Product saved!', 'success');
    btn.disabled = false;
    btn.textContent = 'Save Changes';
    return result;
  } catch (e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = productId ? 'Save Changes' : 'Create Product';
    return false;
  }
}

init();
</script>
</body>
</html>
