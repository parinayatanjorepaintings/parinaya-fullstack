<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — Sri Sri Parinaya</title>
<link rel="stylesheet" href="/admin/css/admin.css"/>
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, #4A0E1A 0%, #6B1A2A 60%, #8B2235 100%); }
  .login-card { background:#fff; border-radius:12px; padding:40px 36px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .login-brand { text-align:center; margin-bottom:28px; }
  .login-brand .brand { font-size:22px; font-weight:700; color:var(--maroon); }
  .login-brand .sub   { font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-light); margin-top:2px; }
  .login-divider { font-size:12px; color:var(--ink-light); text-align:center; margin-bottom:20px; }
  .btn-login { width:100%; padding:11px; font-size:14px; font-weight:600; justify-content:center; margin-top:6px; }
  .error-msg { color:var(--error); font-size:12.5px; margin-top:10px; text-align:center; display:none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <div class="brand">Parinaya</div>
    <div class="sub">Admin Panel</div>
  </div>
  <div class="login-divider">Sign in to manage your store</div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="admin@srisriparinaya.com" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn btn-primary btn-login" id="login-btn" onclick="doLogin()">Sign in</button>
  <div class="error-msg" id="err"></div>
</div>

<div id="toast"></div>
<script src="/admin/js/admin.js"></script>
<script>
  // If already logged in, redirect
  if (localStorage.getItem('admin_token')) {
    fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + localStorage.getItem('admin_token') } })
      .then(r => r.ok ? window.location.href = '/admin/dashboard' : null)
      .catch(() => {});
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const err      = document.getElementById('err');

    if (!email || !password) { showErr('Please enter email and password'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    err.style.display = 'none';

    try {
      const data = await API.post('/auth/login', { email, password });
      localStorage.setItem('admin_token', data.token);
      window.location.href = '/admin/dashboard';
    } catch (e) {
      showErr(e.message || 'Login failed');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
