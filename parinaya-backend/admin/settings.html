<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings — Parinaya Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css"/>
<style>
.image-upload-box {
  border: 2px dashed var(--border-dark);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--bg);
  position: relative;
}
.image-upload-box:hover { border-color: var(--maroon); background: rgba(107,26,42,.03); }
.image-upload-box .preview-img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 4px;
  margin-bottom: 10px;
  display: none;
}
.image-upload-box .placeholder-text { color: var(--ink-light); font-size: 13px; }
.image-upload-box input[type=file] { display: none; }
.img-actions { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="toast"></div>
<script src="/admin/js/admin.js"></script>
<script src="/admin/js/sidebar.js"></script>
<script>
const API_BASE = window.location.origin;
let configMap = {};

async function init() {
  const me = await requireAuth();
  if (!me) return;

  document.getElementById('app').innerHTML = `
    ${renderSidebar()}
    <div class="main">
      <div class="topbar">
        <span class="topbar-title">Settings</span>
        <button class="btn btn-primary" id="save-all-btn" onclick="saveAll()">Save All Changes</button>
      </div>
      <div class="content" style="max-width:860px">

        <div class="tab-nav">
          <button class="tab-btn active" onclick="switchTab('homepage',this)">Homepage</button>
          <button class="tab-btn" onclick="switchTab('brand',this)">Brand</button>
          <button class="tab-btn" onclick="switchTab('contact',this)">Contact</button>
          <button class="tab-btn" onclick="switchTab('social',this)">Social</button>
          <button class="tab-btn" onclick="switchTab('product_defaults',this)">Product Defaults</button>
          <button class="tab-btn" onclick="switchTab('account',this)">Account</button>
        </div>

        <!-- ── HOMEPAGE ─────────────────────────────────────────────── -->
        <div class="tab-panel active" id="tab-homepage">

          <!-- Hero Section -->
          <div class="card mb-6">
            <div class="card-header"><h2>Hero Section</h2></div>
            <div class="card-body">

              <!-- Hero BG Image -->
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Hero Background Image <span class="label-hint">(desktop)</span></label>
                  <div class="image-upload-box" id="hero-img-box" onclick="document.getElementById('hero-img-input').click()">
                    <img id="hero-img-preview" class="preview-img" alt="Hero background preview"/>
                    <div class="placeholder-text" id="hero-img-placeholder">
                      <div style="font-size:28px;margin-bottom:6px">🖼️</div>
                      Click to upload a background image<br/>
                      <span style="font-size:11px">JPEG / PNG / WebP • Max 10MB</span>
                    </div>
                    <input type="file" id="hero-img-input" accept="image/jpeg,image/png,image/webp" onchange="uploadSiteImage('hero_bg_image', this)"/>
                  </div>
                  <div class="img-actions" id="hero-img-actions" style="display:none">
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('hero-img-input').click()">Replace</button>
                    <button class="btn btn-danger btn-sm" onclick="removeSiteImage('hero_bg_image')">Remove</button>
                  </div>
                </div>
                <div class="form-group">
                  <label>Hero Background Image <span class="label-hint">(mobile)</span></label>
                  <div class="image-upload-box" id="heromobile-img-box" onclick="document.getElementById('heromobile-img-input').click()">
                    <img id="heromobile-img-preview" class="preview-img" alt="Mobile hero background preview"/>
                    <div class="placeholder-text" id="heromobile-img-placeholder">
                      <div style="font-size:28px;margin-bottom:6px">📱</div>
                      Upload a tall/portrait image for mobile<br/>
                      <span style="font-size:11px">Falls back to the desktop image if left empty</span>
                    </div>
                    <input type="file" id="heromobile-img-input" accept="image/jpeg,image/png,image/webp" onchange="uploadSiteImage('hero_bg_image_mobile', this)"/>
                  </div>
                  <div class="img-actions" id="heromobile-img-actions" style="display:none">
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('heromobile-img-input').click()">Replace</button>
                    <button class="btn btn-danger btn-sm" onclick="removeSiteImage('hero_bg_image_mobile')">Remove</button>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label>Eyebrow Text <span class="label-hint">(small text above heading)</span></label>
                <input type="text" data-key="hero_eyebrow" placeholder="Handcrafted in South India"/>
              </div>
              <div class="form-group">
                <label>Heading <span class="label-hint">(use \n for line break)</span></label>
                <input type="text" data-key="hero_heading" placeholder="Tanjore Paintings,\nGilded in Tradition."/>
              </div>
              <div class="form-group">
                <label>Body Text</label>
                <textarea data-key="hero_body" rows="3" placeholder="Discover handpainted Tanjore art…"></textarea>
              </div>
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Button 1 — Label</label>
                  <input type="text" data-key="hero_cta1_label" placeholder="Shop Paintings"/>
                </div>
                <div class="form-group">
                  <label>Button 1 — Link</label>
                  <input type="text" data-key="hero_cta1_link" placeholder="/collections/all-tanjore-paintings"/>
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Button 2 — Label</label>
                  <input type="text" data-key="hero_cta2_label" placeholder="Shop Brass Idols"/>
                </div>
                <div class="form-group">
                  <label>Button 2 — Link</label>
                  <input type="text" data-key="hero_cta2_link" placeholder="/collections/brass-idols"/>
                </div>
              </div>
            </div>
          </div>

          <!-- YouTube Section -->
          <div class="card mb-6">
            <div class="card-header"><h2>YouTube Video Section</h2></div>
            <div class="card-body">
              <div class="form-group" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">
                <span style="font-size:13px">🎬 The actual videos are managed on the <a href="/admin/videos" style="color:var(--maroon);font-weight:600">Videos</a> page — add as many as you like and they'll show as a slider here. The fields below only control the heading text above the slider.</span>
              </div>
              <div class="form-group">
                <label>Section Title</label>
                <input type="text" data-key="youtube_section_title" placeholder="See Our Craft in Action"/>
              </div>
              <div class="form-group">
                <label>Section Subtitle</label>
                <input type="text" data-key="youtube_section_subtitle" placeholder="Watch how every Tanjore painting comes to life…"/>
              </div>
            </div>
          </div>

          <!-- Our Story Section -->
          <div class="card mb-6">
            <div class="card-header"><h2>Our Story Section</h2></div>
            <div class="card-body">

              <!-- Story Image -->
              <div class="form-group">
                <label>Story / Studio Photo</label>
                <div class="image-upload-box" id="story-img-box" onclick="document.getElementById('story-img-input').click()">
                  <img id="story-img-preview" class="preview-img" alt="Story image preview"/>
                  <div class="placeholder-text" id="story-img-placeholder">
                    <div style="font-size:28px;margin-bottom:6px">📷</div>
                    Upload your studio or artisan photo<br/>
                    <span style="font-size:11px">JPEG / PNG / WebP • Max 10MB</span>
                  </div>
                  <input type="file" id="story-img-input" accept="image/jpeg,image/png,image/webp" onchange="uploadSiteImage('story_image', this)"/>
                </div>
                <div class="img-actions" id="story-img-actions" style="display:none">
                  <button class="btn btn-outline btn-sm" onclick="document.getElementById('story-img-input').click()">Replace</button>
                  <button class="btn btn-danger btn-sm" onclick="removeSiteImage('story_image')">Remove</button>
                </div>
              </div>

              <div class="form-group">
                <label>Eyebrow Text</label>
                <input type="text" data-key="story_eyebrow" placeholder="Our Story"/>
              </div>
              <div class="form-group">
                <label>Heading</label>
                <input type="text" data-key="story_heading" placeholder="A Tradition of Gold, Painted by Hand"/>
              </div>
              <div class="form-group">
                <label>Paragraph 1</label>
                <textarea data-key="story_body1" rows="4" placeholder="At Sri Sri Parinaya, every Tanjore painting begins…"></textarea>
              </div>
              <div class="form-group">
                <label>Paragraph 2</label>
                <textarea data-key="story_body2" rows="3" placeholder="Visit our studio in Hyderabad…"></textarea>
              </div>
            </div>
          </div>

          <!-- Announcement -->
          <div class="card mb-6">
            <div class="card-header"><h2>Announcement Bar</h2></div>
            <div class="card-body">
              <div class="form-group">
                <label>Announcement Bar Text</label>
                <input type="text" data-key="announcement" placeholder="Handcrafted Tanjore Paintings • Made to Order…"/>
              </div>
            </div>
          </div>
        </div>

        <!-- ── BRAND ──────────────────────────────────────────────────── -->
        <div class="tab-panel" id="tab-brand">
          <div class="card">
            <div class="card-header"><h2>Brand Identity</h2></div>
            <div class="card-body">
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Site Name</label>
                  <input type="text" data-key="site_name" placeholder="Sri Sri Parinaya"/>
                </div>
                <div class="form-group">
                  <label>Tagline</label>
                  <input type="text" data-key="tagline" placeholder="Tanjore Paintings & Traditional Art"/>
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Logo Text (large)</label>
                  <input type="text" data-key="logo_text" placeholder="Parinaya"/>
                </div>
                <div class="form-group">
                  <label>Logo Subtext</label>
                  <input type="text" data-key="logo_subtext" placeholder="TANJORE PAINTINGS"/>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── CONTACT ───────────────────────────────────────────────── -->
        <div class="tab-panel" id="tab-contact">
          <div class="card">
            <div class="card-header"><h2>Contact Information</h2></div>
            <div class="card-body">
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Phone (digits only)</label>
                  <input type="text" data-key="phone" placeholder="7075703309"/>
                </div>
                <div class="form-group">
                  <label>Phone Display</label>
                  <input type="text" data-key="phone_display" placeholder="+91 70757 03309"/>
                </div>
              </div>
              <div class="form-group">
                <label>WhatsApp Number <span class="label-hint">(with country code, no + or spaces)</span></label>
                <input type="text" data-key="whatsapp_number" placeholder="917075703309"/>
                <div class="form-hint">All "Enquire on WhatsApp" buttons use this number</div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" data-key="email" placeholder="parinayatanjorepaintings@gmail.com"/>
              </div>
              <div class="form-group">
                <label>Shop Address</label>
                <textarea data-key="address" rows="3"></textarea>
              </div>
              <div class="section-heading" style="margin-top:8px">Business Hours</div>
              <div class="form-group">
                <label>Weekday Hours</label>
                <input type="text" data-key="hours_weekday" placeholder="Monday – Friday | 10:00 AM – 9:00 PM"/>
              </div>
              <div class="form-row cols-2">
                <div class="form-group">
                  <label>Saturday</label>
                  <input type="text" data-key="hours_saturday" placeholder="Saturday | 10:00 AM – 9:00 PM"/>
                </div>
                <div class="form-group">
                  <label>Sunday</label>
                  <input type="text" data-key="hours_sunday" placeholder="Sunday | 10:00 AM – 9:00 PM"/>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── SOCIAL ────────────────────────────────────────────────── -->
        <div class="tab-panel" id="tab-social">
          <div class="card">
            <div class="card-header"><h2>Social Media Links</h2></div>
            <div class="card-body">
              <div class="form-group">
                <label>Facebook URL</label>
                <input type="text" data-key="facebook_url" placeholder="https://www.facebook.com/…"/>
              </div>
              <div class="form-group">
                <label>Instagram URL</label>
                <input type="text" data-key="instagram_url" placeholder="https://www.instagram.com/…"/>
              </div>
              <div class="form-group">
                <label>YouTube Channel URL <span class="label-hint">(leave blank to hide)</span></label>
                <input type="text" data-key="youtube_channel_url" placeholder="https://www.youtube.com/@yourchannel"/>
              </div>
              <div class="form-group">
                <label>LinkedIn URL <span class="label-hint">(leave blank to hide)</span></label>
                <input type="text" data-key="linkedin_url" placeholder="https://www.linkedin.com/…"/>
              </div>
            </div>
          </div>
        </div>

        <!-- ── PRODUCT DEFAULTS ──────────────────────────────────────── -->
        <div class="tab-panel" id="tab-product_defaults">
          <div class="card">
            <div class="card-header"><h2>Product Page Defaults</h2></div>
            <div class="card-body">
              <p class="text-muted" style="font-size:12.5px;margin-bottom:18px">Shown on every product page unless overridden per product.</p>
              <div class="form-group">
                <label>Trust Badge 1 — Shipping 🚚</label>
                <input type="text" data-key="trust_badge_1_default"/>
              </div>
              <div class="form-group">
                <label>Trust Badge 2 — Quality 🛡</label>
                <input type="text" data-key="trust_badge_2_default"/>
              </div>
              <div class="section-heading" style="margin-top:8px">Accordion Defaults</div>
              <div class="form-group">
                <label>Shipping & Returns</label>
                <textarea data-key="shipping_returns_default" rows="5"></textarea>
              </div>
              <div class="form-group">
                <label>Care Instructions</label>
                <textarea data-key="care_instructions_default" rows="3"></textarea>
              </div>
              <div class="form-group">
                <label>Please Note</label>
                <textarea data-key="please_note_default" rows="3"></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- ── ACCOUNT ───────────────────────────────────────────────── -->
        <div class="tab-panel" id="tab-account">
          <div class="card">
            <div class="card-header"><h2>Change Password</h2></div>
            <div class="card-body">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="cur-pw"/>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-pw" placeholder="Min 8 characters"/>
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="cnf-pw"/>
              </div>
              <button class="btn btn-primary" onclick="changePw()">Update Password</button>
            </div>
          </div>
        </div>

      </div><!-- content -->
    </div>`;

  setActiveNav();
  await loadConfig();
}

async function loadConfig() {
  try {
    const rows = await API.get('/config/admin');
    configMap = {};
    for (const row of rows) configMap[row.key] = row.value;

    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (configMap[key] !== undefined) el.value = configMap[key];
    });

    // Show existing hero bg image
    if (configMap.hero_bg_image) showImagePreview('hero', configMap.hero_bg_image);
    // Show existing mobile hero bg image
    if (configMap.hero_bg_image_mobile) showImagePreview('heromobile', configMap.hero_bg_image_mobile);
    // Show existing story image
    if (configMap.story_image) showImagePreview('story', configMap.story_image);
  } catch (e) {
    toast('Failed to load settings: ' + e.message, 'error');
  }
}

function showImagePreview(prefix, filename) {
  if (!filename) return;
  const preview = document.getElementById(`${prefix}-img-preview`);
  const placeholder = document.getElementById(`${prefix}-img-placeholder`);
  const actions = document.getElementById(`${prefix}-img-actions`);
  if (!preview) return;
  preview.src = `${API_BASE}/uploads/${filename}`;
  preview.style.display = 'block';
  if (placeholder) placeholder.style.display = 'none';
  if (actions) actions.style.display = 'flex';
}

function hideImagePreview(prefix) {
  const preview = document.getElementById(`${prefix}-img-preview`);
  const placeholder = document.getElementById(`${prefix}-img-placeholder`);
  const actions = document.getElementById(`${prefix}-img-actions`);
  if (preview) { preview.src = ''; preview.style.display = 'none'; }
  if (placeholder) placeholder.style.display = '';
  if (actions) actions.style.display = 'none';
}

const KEY_PREFIX = {
  hero_bg_image: 'hero',
  hero_bg_image_mobile: 'heromobile',
  story_image: 'story',
};

async function uploadSiteImage(key, input) {
  const file = input.files[0];
  if (!file) return;
  const prefix = KEY_PREFIX[key] || key;

  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById(`${prefix}-img-preview`);
    const placeholder = document.getElementById(`${prefix}-img-placeholder`);
    const actions = document.getElementById(`${prefix}-img-actions`);
    preview.src = e.target.result;
    preview.style.display = 'block';
    if (placeholder) placeholder.style.display = 'none';
    if (actions) actions.style.display = 'flex';
  };
  reader.readAsDataURL(file);

  try {
    const fd = new FormData();
    fd.append('image', file);
    const result = await API.upload(`/siteimages/${key}`, fd);
    configMap[key] = result.filename;
    toast('Image uploaded!', 'success');
  } catch (e) {
    toast('Upload failed: ' + e.message, 'error');
    hideImagePreview(prefix);
  }
  input.value = '';
}

async function removeSiteImage(key) {
  const prefix = KEY_PREFIX[key] || key;
  try {
    await API.delete(`/siteimages/${key}`);
    configMap[key] = '';
    hideImagePreview(prefix);
    toast('Image removed', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function saveAll() {
  const updates = {};
  document.querySelectorAll('[data-key]').forEach(el => {
    updates[el.getAttribute('data-key')] = el.value;
  });
  const btn = document.getElementById('save-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    await API.put('/config', updates);
    toast('Settings saved!', 'success');
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save All Changes';
  }
}

async function changePw() {
  const cur = document.getElementById('cur-pw').value;
  const nw  = document.getElementById('new-pw').value;
  const cnf = document.getElementById('cnf-pw').value;
  if (!cur || !nw) { toast('Fill in all fields', 'error'); return; }
  if (nw !== cnf)  { toast('Passwords do not match', 'error'); return; }
  if (nw.length < 8) { toast('Min 8 characters', 'error'); return; }
  try {
    await API.post('/auth/change-password', { currentPassword: cur, newPassword: nw });
    toast('Password updated!', 'success');
    ['cur-pw','new-pw','cnf-pw'].forEach(id => document.getElementById(id).value = '');
  } catch (e) {
    toast(e.message, 'error');
  }
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  btn.classList.add('active');
}

init();
</script>
</body>
</html>
